<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect - Healthcare Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shape"></div>
    <div class="background-shape shape2"></div>

    <main class="container">
        <header>
            <h1>CareConnect NGO</h1>
            <p>Empowering Health, Together.</p>
        </header>

        <section class="glass-card form-section">
            <h2>Volunteer / Patient Registration</h2>
            <form id="registrationForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+91 9876543210">
                </div>
                
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" required placeholder="25" min="1" max="120">
                </div>
                
                <div class="input-group">
                    <label for="role">Registering As</label>
                    <select id="role" required>
                        <option value="volunteer">Volunteer</option>
                        <option value="patient">Patient seeking support</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="details">Symptoms / Skills</label>
                    <textarea id="details" required placeholder="Briefly describe..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Submit Details</button>
            </form>
            <p id="formMessage" class="hidden success-msg">Details submitted successfully! Our team will contact you.</p>
        </section>
    </main>

    <button id="floatingChatBtn" class="floating-chat-btn">💬</button>

    <div class="chatbot-container glass-card" id="chatbotWindow" style="display: none;">
        <div class="chat-header">
            <h3>AI Health Assistant</h3>
            <button id="closeChat" class="toggle-btn">✖</button>
        </div>
        <div id="chatBody" class="chat-body">
            <div class="messages" id="chatMessages">
                <div class="bot-msg">Hi! I am your AI Assistant. Ask me FAQs like "How to volunteer?", "Timings?", or "Contact info".</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Ask a question...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
